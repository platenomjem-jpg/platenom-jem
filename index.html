<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة النادي الرياضي والكافيه</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ================= شاشة تسجيل الدخول ================= -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>🏋️ نادي رياضي وكافيه</h1>
        <p class="subtitle">نظام الإدارة الشامل</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="اسم المستخدم" required autocomplete="username">
            <input type="password" id="password" placeholder="كلمة المرور" required autocomplete="current-password">
            <button type="submit">تسجيل الدخول</button>
            <p id="loginError" class="error-msg"></p>
        </form>
    </div>
</div>

<!-- ================= الواجهة الرئيسية بعد الدخول ================= -->
<div id="appScreen" class="app-screen hidden">
    <header class="app-header">
        <div class="header-title">🏋️ نظام النادي والكافيه</div>
        <div class="header-user">
            <span id="userName"></span>
            <button id="logoutBtn" class="btn-logout">خروج</button>
        </div>
    </header>

    <nav class="app-nav">
        <button class="nav-btn active" data-page="dashboard">📊 الرئيسية</button>
        <button class="nav-btn" data-page="members">👥 الأعضاء</button>
        <button class="nav-btn" data-page="pos">☕ الكافيه (بيع)</button>
        <button class="nav-btn" data-page="products">📦 المنتجات والمخزون</button>
        <button class="nav-btn" data-page="reports">💰 التقارير والحسابات</button>
    </nav>

    <main id="pageContent" class="page-content">
        <!-- يتم تحميل محتوى كل صفحة هنا عبر JS -->
    </main>
</div>

<script src="/api.js"></script>
<script src="/auth.js"></script>
<script src="/dashboard.js"></script>
<script src="/members.js"></script>
<script src="/products.js"></script>
<script src="/pos.js"></script>
<script src="/reports.js"></script>
<script src="/app.js"></script>
</body>
</html>
